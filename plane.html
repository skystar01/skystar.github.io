<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>星际射手 | 经典弹幕游戏复刻</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #030318 0%, #010108 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', 'Fira Code', monospace;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: #000000aa;
            border-radius: 32px;
            padding: 16px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(2px);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 0 0 3px #2aff9e55, 0 10px 25px black;
            cursor: none;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 18px;
            padding: 8px 20px;
            background: #0b0c1acc;
            border-radius: 60px;
            backdrop-filter: blur(8px);
            border: 1px solid #2aff9e33;
        }

        .score-box, .lives-box {
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #00ffc3;
        }

        .score-box span, .lives-box span {
            color: #b0ffea;
            font-size: 18px;
            margin-right: 12px;
        }

        .score-box {
            color: #f2ff80;
        }

        .lives-box {
            color: #ff7b89;
        }

        .restart-btn {
            background: #2c2e4e;
            border: none;
            font-family: inherit;
            font-size: 18px;
            font-weight: bold;
            padding: 6px 20px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 8px black;
        }

        .restart-btn:hover {
            background: #4f5b9e;
            transform: scale(0.97);
            box-shadow: 0 1px 3px black;
        }

        .controls-tip {
            margin-top: 12px;
            font-size: 13px;
            text-align: center;
            color: #8fa2c0;
            background: #05070fe0;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: bold;
        }

        @keyframes blinkWarning {
            0% { opacity: 1; text-shadow: 0 0 0 red; }
            100% { opacity: 0.3; text-shadow: 0 0 8px red; }
        }
        .warning {
            animation: blinkWarning 0.2s infinite;
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="900" height="650"></canvas>
        <div class="info-panel">
            <div class="score-box"><span>⚡ SCORE</span> <span id="scoreValue">0</span></div>
            <div class="lives-box"><span>❤️ LIVES</span> <span id="livesValue">3</span></div>
            <button class="restart-btn" id="restartButton">🔄 重新起飞</button>
        </div>
        <div class="controls-tip">
            🎮 [ ← → ] 移动 &nbsp;&nbsp;|&nbsp;&nbsp; [ Z / K / 空格 ] 开火 &nbsp;&nbsp;|&nbsp;&nbsp; 无敌闪烁时免伤
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- CANVAS ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ---------- 游戏尺寸 ----------
        const W = 900, H = 650;
        
        // ---------- 游戏状态 ----------
        let gameRunning = true;
        let score = 0;
        let lives = 3;
        let invincibleFrames = 0;      // 无敌帧数 (受击后短暂无敌)
        let invincibleDuration = 45;    // 大约0.75秒 (60fps下)
        
        // ---------- 玩家属性 ----------
        const PLAYER_WIDTH = 32;
        const PLAYER_HEIGHT = 32;
        let player = {
            x: W/2 - PLAYER_WIDTH/2,
            y: H - 70,
            width: PLAYER_WIDTH,
            height: PLAYER_HEIGHT,
            speed: 7
        };
        
        // 射击冷却
        let shootCooldown = 0;
        const SHOOT_DELAY_FRAMES = 8;   // 射速中等，爽快感
        
        // ---------- 动态实体 ----------
        let playerBullets = [];      // 玩家子弹 {x,y,w,h, active}
        let enemies = [];            // 敌机 {x,y,w,h, hp, type, shootTimer}
        let enemyBullets = [];       // 敌方子弹 {x,y,w,h}
        
        // 子弹尺寸 (视觉合适)
        const BULLET_W = 5;
        const BULLET_H = 12;
        const ENEMY_BULLET_W = 6;
        const ENEMY_BULLET_H = 12;
        
        // ---------- 敌人配置 ----------
        const ENEMY_BASE_W = 36;
        const ENEMY_BASE_H = 32;
        let enemySpawnCounter = 0;
        let enemySpawnDelay = 28;     // 初始生成频率 (帧)
        let waveLevel = 1;
        
        // 敌人类型: 0 = 普通 (红色, 1生命, 直下移动)
        //          1 = 炮艇 (紫色, 1生命, 会发射子弹)
        let enemyTypeWeights = [0,1]; // 普通:炮艇
        
        // 全局帧率协调
        let frame = 0;
        let animationId = null;
        
        // ---------- 键盘控制 ----------
        const keys = {
            ArrowLeft: false,
            ArrowRight: false,
            Space: false,
            KeyZ: false,
            KeyK: false
        };
        
        // ---------- UI 元素 ----------
        const scoreSpan = document.getElementById('scoreValue');
        const livesSpan = document.getElementById('livesValue');
        const restartBtn = document.getElementById('restartButton');
        
        // ---------- 辅助函数 ----------
        function updateUI() {
            scoreSpan.innerText = score;
            livesSpan.innerText = lives;
        }
        
        // 重置游戏全部数据
        function restartGame() {
            gameRunning = true;
            score = 0;
            lives = 3;
            invincibleFrames = 0;
            player.x = W/2 - PLAYER_WIDTH/2;
            player.y = H - 70;
            shootCooldown = 0;
            playerBullets = [];
            enemies = [];
            enemyBullets = [];
            enemySpawnCounter = 5;
            waveLevel = 1;
            enemySpawnDelay = 28;
            updateUI();
        }
        
        // 生成敌人 (类型随机)
        function spawnEnemy() {
            // 动态难度：分数越高, 生成越快, 炮艇比例略增
            let dynamicDelay = Math.max(18, 32 - Math.floor(score / 400));
            enemySpawnDelay = dynamicDelay;
            
            let rand = Math.random();
            let type = 0; // 默认普通
            // 随着分数上升，炮艇概率增加 最多50%
            let specialChance = Math.min(0.5, 0.2 + Math.floor(score / 800) * 0.1);
            if(rand < specialChance) {
                type = 1;  // 炮艇
            } else {
                type = 0;
            }
            
            let x = Math.random() * (W - ENEMY_BASE_W);
            let y = -ENEMY_BASE_H - Math.random() * 40;
            let hp = 1;
            let shootTimer = 0;
            // 炮艇初始射击计时随机错开
            if(type === 1) {
                shootTimer = Math.floor(Math.random() * 40);
            }
            enemies.push({
                x: x, y: y, w: ENEMY_BASE_W, h: ENEMY_BASE_H,
                hp: hp, type: type, shootTimer: shootTimer
            });
        }
        
        // 玩家射击
        function shootFromPlayer() {
            if(!gameRunning) return;
            playerBullets.push({
                x: player.x + PLAYER_WIDTH/2 - BULLET_W/2,
                y: player.y - 8,
                w: BULLET_W,
                h: BULLET_H,
                active: true
            });
            // 可选额外音效感(无声音代码 纯粹视觉)
        }
        
        // 敌人射击 (由特定敌人调用)
        function enemyShoot(e) {
            if(!gameRunning) return;
            enemyBullets.push({
                x: e.x + e.w/2 - ENEMY_BULLET_W/2,
                y: e.y + e.h/2,
                w: ENEMY_BULLET_W,
                h: ENEMY_BULLET_H
            });
        }
        
        // 碰撞检测 (矩形)
        function rectCollide(r1, r2) {
            return !(r2.x > r1.x + r1.w ||
                r2.x + r2.w < r1.x ||
                r2.y > r1.y + r1.h ||
                r2.y + r2.h < r1.y);
        }
        
        // 游戏逻辑更新 (每帧)
        function updateGame() {
            if(!gameRunning) return;
            
            // 1. 无敌帧递减
            if(invincibleFrames > 0) {
                invincibleFrames--;
            }
            
            // 2. 玩家移动 (左右边界限制)
            let move = 0;
            if(keys.ArrowLeft) move = -1;
            if(keys.ArrowRight) move = 1;
            let newX = player.x + move * player.speed;
            if(newX >= 0 && newX + PLAYER_WIDTH <= W) {
                player.x = newX;
            }
            
            // 3. 射击冷却 & 开火
            if(shootCooldown > 0) shootCooldown--;
            if((keys.Space || keys.KeyZ || keys.KeyK) && shootCooldown === 0 && gameRunning) {
                shootFromPlayer();
                shootCooldown = SHOOT_DELAY_FRAMES;
            }
            
            // 4. 玩家子弹移动 & 碰撞敌人
            for(let i=0; i<playerBullets.length; i++) {
                let b = playerBullets[i];
                b.y -= 8;  // 向上速度
                if(b.y + b.h < 0 || b.y > H) {
                    playerBullets.splice(i,1);
                    i--;
                    continue;
                }
                let hit = false;
                for(let j=0; j<enemies.length; j++) {
                    let e = enemies[j];
                    if(rectCollide(b, e)) {
                        // 命中敌人
                        e.hp -= 1;
                        hit = true;
                        if(e.hp <= 0) {
                            // 击毁得分
                            score += 10;
                            updateUI();
                            enemies.splice(j,1);
                            j--;
                        }
                        break;
                    }
                }
                if(hit) {
                    playerBullets.splice(i,1);
                    i--;
                }
            }
            
            // 5. 敌人移动 & 边界清除 & 射击逻辑
            for(let i=0; i<enemies.length; i++) {
                let e = enemies[i];
                // 移动 (速度随难度轻微增加)
                let baseSpeed = 2.5 + Math.min(2.2, score / 1200);
                e.y += baseSpeed;
                
                // 超出底部或顶部(超出底部会扣血逻辑单独处理)
                if(e.y + e.h > H + 80 || e.y + e.h < -100) {
                    enemies.splice(i,1);
                    i--;
                    continue;
                }
                
                // 炮艇射击逻辑
                if(e.type === 1 && gameRunning) {
                    e.shootTimer = (e.shootTimer || 0) + 1;
                    // 射击间隔 35~45帧
                    if(e.shootTimer >= 40) {
                        enemyShoot(e);
                        e.shootTimer = 0;
                    }
                } else if(e.type === 0){
                    // 普通敌人偶尔也会射击? 但经典"打飞机"复刻 普通敌机也可零星射击 (增加趣味)
                    // 让普通敌人有10%概率进化感？但为了弹幕爽感，普通敌人也有低概率射击(不会太密集)
                    if(Math.random() < 0.008 && gameRunning) {
                        enemyShoot(e);
                    }
                }
            }
            
            // 6. 敌方子弹移动 & 碰撞玩家
            for(let i=0; i<enemyBullets.length; i++) {
                let eb = enemyBullets[i];
                eb.y += 5.5;
                if(eb.y + eb.h < 0 || eb.y > H + 100) {
                    enemyBullets.splice(i,1);
                    i--;
                    continue;
                }
                // 碰撞玩家
                if(rectCollide(eb, {x:player.x, y:player.y, w:PLAYER_WIDTH, h:PLAYER_HEIGHT})) {
                    // 命中玩家
                    if(invincibleFrames <= 0 && gameRunning) {
                        lives--;
                        updateUI();
                        if(lives <= 0) {
                            gameRunning = false;   // 游戏结束
                        } else {
                            invincibleFrames = invincibleDuration;
                            // 重置玩家位置到中间下方(避免连续撞子弹)
                            player.x = W/2 - PLAYER_WIDTH/2;
                            // 同时清除屏幕上一部分子弹防止瞬间再次致死? 保留挑战但无敌帧已足够
                            // 为了公平，不清子弹，但无敌帧会闪烁保护
                        }
                    }
                    // 移除敌方子弹
                    enemyBullets.splice(i,1);
                    i--;
                }
            }
            
            // 7. 玩家与敌人碰撞 (直接损失生命)
            for(let i=0; i<enemies.length; i++) {
                let e = enemies[i];
                if(rectCollide({x:player.x, y:player.y, w:PLAYER_WIDTH, h:PLAYER_HEIGHT}, e)) {
                    if(invincibleFrames <= 0 && gameRunning) {
                        lives--;
                        updateUI();
                        if(lives <= 0) {
                            gameRunning = false;
                        } else {
                            invincibleFrames = invincibleDuration;
                            player.x = W/2 - PLAYER_WIDTH/2;
                        }
                        // 碰撞后摧毁该敌人(防止多次判定)
                        enemies.splice(i,1);
                        i--;
                        // 额外减少无敌时再次碰撞风险
                    } else {
                        // 无敌帧下, 敌人仍然造成击退？不移除敌人会导致持续卡肉? 直接移除敌人避免烦人
                        enemies.splice(i,1);
                        i--;
                    }
                }
            }
            
            // 8. 动态生成敌人 (波次)
            if(enemySpawnCounter <= 0) {
                if(enemies.length < 14) {  // 控制最大数量
                    spawnEnemy();
                }
                // 重新设置生成延迟，随机微调
                let dynamic = Math.max(18, enemySpawnDelay + (Math.random() * 6 - 3));
                enemySpawnCounter = Math.floor(dynamic);
            } else {
                enemySpawnCounter--;
            }
            
            // 动态难度调整: 如果分数超过1000，额外增加生成倾向
            if(score > 800 && enemySpawnDelay > 20) {
                enemySpawnDelay = Math.max(19, enemySpawnDelay - 0.015);
            }
            
            // 游戏结束后续停止更新交互，但绘制继续显示结束界面
        }
        
        // ---------- 绘图模块 (炫酷弹幕视觉) ----------
        function drawStars() {
            for(let i=0; i<300; i++) {
                if(i%2 === 0) continue; // 模拟随机用固定偏移
                let sx = (i * 131) % W;
                let sy = (i * 253 + frame) % H;
                ctx.fillStyle = `rgba(255,240,200,${0.3+Math.sin(frame*0.02+i)*0.2})`;
                ctx.fillRect(sx, sy, 1.5, 1.5);
            }
            // 额外动态星星
            for(let i=0;i<150;i++){
                let x = (i*997 + frame*2)%W;
                let y = (i*367)%H;
                ctx.fillStyle = `rgba(255,200,100,0.6)`;
                ctx.fillRect(x, y, 1, 1);
            }
        }
        
        function drawPlayer() {
            let px = player.x, py = player.y;
            // 无敌闪烁效果 (每5帧变化)
            let drawSolid = true;
            if(invincibleFrames > 0 && (Math.floor(Date.now() / 50) % 3 === 0)) {
                drawSolid = false;
            }
            if(!drawSolid) {
                ctx.globalAlpha = 0.6;
            }
            // 喷气引擎光效
            ctx.shadowBlur = 12;
            ctx.shadowColor = "#2affcc";
            // 主体三角形
            ctx.beginPath();
            ctx.moveTo(px + PLAYER_WIDTH/2, py);
            ctx.lineTo(px + PLAYER_WIDTH-6, py + PLAYER_HEIGHT-6);
            ctx.lineTo(px + PLAYER_WIDTH/2, py + PLAYER_HEIGHT-2);
            ctx.lineTo(px + 6, py + PLAYER_HEIGHT-6);
            ctx.fillStyle = "#7df9ff";
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(px + PLAYER_WIDTH/2, py+4);
            ctx.lineTo(px + PLAYER_WIDTH-10, py + PLAYER_HEIGHT-8);
            ctx.lineTo(px + PLAYER_WIDTH/2, py + PLAYER_HEIGHT-4);
            ctx.lineTo(px + 10, py + PLAYER_HEIGHT-8);
            ctx.fillStyle = "#42e0ff";
            ctx.fill();
            // 左右翼
            ctx.fillStyle = "#ffd966";
            ctx.fillRect(px+4, py+14, 6, 8);
            ctx.fillRect(px+PLAYER_WIDTH-10, py+14, 6, 8);
            // 机炮
            ctx.fillStyle = "orange";
            ctx.fillRect(px+PLAYER_WIDTH/2-3, py+4, 6, 8);
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }
        
        function drawEnemy(e) {
            if(e.type === 0) {
                // 红色经典敌机
                ctx.fillStyle = "#e34d4d";
                ctx.shadowBlur = 6;
                ctx.shadowColor = "red";
                ctx.fillRect(e.x, e.y, e.w, e.h);
                ctx.fillStyle = "#b02c2c";
                ctx.fillRect(e.x+4, e.y+6, e.w-8, 6);
                ctx.fillStyle = "#ff7777";
                ctx.beginPath();
                ctx.ellipse(e.x+e.w/2, e.y+12, 8, 6, 0, 0, Math.PI*2);
                ctx.fill();
            } else {
                // 紫色炮艇
                ctx.fillStyle = "#b76eff";
                ctx.shadowColor = "#c05eff";
                ctx.fillRect(e.x, e.y, e.w, e.h);
                ctx.fillStyle = "#862dff";
                ctx.fillRect(e.x+6, e.y+8, e.w-12, 6);
                ctx.fillStyle = "#f4c2ff";
                ctx.beginPath();
                ctx.arc(e.x+e.w/2, e.y+e.h-12, 8, 0, Math.PI*2);
                ctx.fill();
                // 炮管
                ctx.fillStyle = "#ffa500";
                ctx.fillRect(e.x+e.w/2-3, e.y+e.h-6, 6, 10);
            }
            ctx.shadowBlur = 0;
            // 眼睛
            ctx.fillStyle = "white";
            ctx.fillRect(e.x+e.w*0.2, e.y+8, 6, 6);
            ctx.fillRect(e.x+e.w*0.7, e.y+8, 6, 6);
            ctx.fillStyle = "#020202";
            ctx.fillRect(e.x+e.w*0.2+2, e.y+9, 3, 3);
            ctx.fillRect(e.x+e.w*0.7+2, e.y+9, 3, 3);
        }
        
        function drawBullets() {
            for(let b of playerBullets) {
                ctx.fillStyle = "#ffdf70";
                ctx.shadowBlur = 6;
                ctx.shadowColor = "gold";
                ctx.fillRect(b.x, b.y, b.w, b.h);
                ctx.fillStyle = "#ffb347";
                ctx.fillRect(b.x+1, b.y+2, b.w-2, b.h-4);
            }
            for(let eb of enemyBullets) {
                ctx.fillStyle = "#ff3a6f";
                ctx.shadowBlur = 5;
                ctx.shadowColor = "#ff0066";
                ctx.fillRect(eb.x, eb.y, eb.w, eb.h);
                ctx.fillStyle = "#ff8cae";
                ctx.fillRect(eb.x+1, eb.y+2, eb.w-2, eb.h-4);
            }
            ctx.shadowBlur = 0;
        }
        
        function drawHUDinfo() {
            ctx.font = "bold 22m 'Courier New'";
            ctx.fillStyle = "#bfffc2";
            ctx.shadowBlur = 0;
            if(!gameRunning) {
                ctx.font = "bold 38 monospace";
                ctx.fillStyle = "#ff6680";
                ctx.shadowColor = "black";
                ctx.fillText("💀 GAME OVER 💀", W/2-140, H/2-50);
                ctx.font = "bold 18 monospace";
                ctx.fillStyle = "#ddddaa";
                ctx.fillText("点击「重新起飞」继续征战星河", W/2-150, H/2+40);
            }
            // 显示无敌图标小提示
            if(invincibleFrames > 0) {
                ctx.font = "bold 16 monospace";
                ctx.fillStyle = "#9effcf";
                ctx.fillText("✨ 护盾激活 ✨", player.x-10, player.y-12);
            }
        }
        
        function drawBackgroundGrid() {
            ctx.fillStyle = "#020218";
            ctx.fillRect(0,0,W,H);
            for(let i=0;i<W+30;i+=40){
                ctx.beginPath();
                ctx.strokeStyle = "#2affaa22";
                ctx.lineWidth = 0.5;
                ctx.moveTo(i,0);
                ctx.lineTo(i+ (frame%40)*0.3, H);
                ctx.stroke();
            }
        }
        
        // 主渲染
        function drawScene() {
            drawBackgroundGrid();
            drawStars();
            // 画敌方单位
            for(let e of enemies) drawEnemy(e);
            drawBullets();
            drawPlayer();
            drawHUDinfo();
            
            // 额外特效弹幕提示
            ctx.font = "12 monospace";
            ctx.fillStyle = "#66ffccaa";
            ctx.fillText("经典弹幕 · 火力全开", W-130, 30);
        }
        
        // ---------- 动画循环 ----------
        let lastTimestamp = 0;
        function gameLoop() {
            if(gameRunning) {
                updateGame();
            }
            drawScene();
            frame++;
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // ---------- 键盘监听 ----------
        function handleKeyDown(e) {
            let code = e.code;
            if(keys.hasOwnProperty(code)) {
                keys[code] = true;
                e.preventDefault();
            }
            // 防止空格滚动页面
            if(code === 'Space') {
                e.preventDefault();
            }
            // 按R重启彩蛋
            if(code === 'KeyR') {
                e.preventDefault();
                restartGame();
            }
        }
        
        function handleKeyUp(e) {
            let code = e.code;
            if(keys.hasOwnProperty(code)) {
                keys[code] = false;
                e.preventDefault();
            }
        }
        
        // 窗口失去焦点时重置按键避免卡方向
        function resetKeys() {
            for(let k in keys) keys[k] = false;
        }
        
        // 移动端触摸简单支持 (可选但完整,仅保留平滑体验)
        function initMobileControls() {
            let touchActive = false;
            let lastX = null;
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                let rect = canvas.getBoundingClientRect();
                let touchX = e.touches[0].clientX - rect.left;
                let newX = touchX - PLAYER_WIDTH/2;
                newX = Math.min(Math.max(newX, 0), W - PLAYER_WIDTH);
                if(gameRunning) player.x = newX;
            });
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                // 触摸开火
                if(gameRunning && shootCooldown === 0) {
                    shootFromPlayer();
                    shootCooldown = SHOOT_DELAY_FRAMES;
                }
            });
        }
        
        // 重启按钮事件
        restartBtn.addEventListener('click', () => {
            restartGame();
            gameRunning = true;
            // 清空残留弹幕
            playerBullets = [];
            enemies = [];
            enemyBullets = [];
            invincibleFrames = 0;
            player.x = W/2 - PLAYER_WIDTH/2;
            updateUI();
        });
        
        // 监听键盘
        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
        window.addEventListener('blur', resetKeys);
        
        // 初始化游戏
        restartGame();
        initMobileControls();
        // 开始游戏循环
        gameLoop();
        
        // 清理animationFrame无必要, 但保持页面关闭不影响
    })();
</script>
</body>
</html>
